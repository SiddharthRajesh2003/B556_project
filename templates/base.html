<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Fertility Clinic{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f5f7fa; color: #333; }
        nav {
            background: #2c5f8a; color: white; padding: 12px 24px;
            display: flex; align-items: center; justify-content: space-between;
        }
        nav a { color: white; text-decoration: none; margin-left: 20px; font-size: 14px; }
        nav a:hover { text-decoration: underline; }
        .nav-brand { font-size: 18px; font-weight: bold; }
        .container { max-width: 1100px; margin: 32px auto; padding: 0 24px; }
        h1 { font-size: 22px; margin-bottom: 20px; color: #2c5f8a; }
        h2 { font-size: 16px; margin-bottom: 12px; color: #555; }
        .card {
            background: white; border-radius: 8px;
            padding: 20px; margin-bottom: 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background: #f0f4f8; text-align: left; padding: 10px 12px; border-bottom: 2px solid #ddd; }
        td { padding: 10px 12px; border-bottom: 1px solid #eee; }
        tr:hover td { background: #fafcff; }
        a.btn {
            display: inline-block; padding: 6px 14px; border-radius: 4px;
            font-size: 13px; text-decoration: none; margin-right: 6px;
        }
        .btn-primary { background: #2c5f8a; color: white; }
        .btn-secondary { background: #eee; color: #333; }
        .badge {
            display: inline-block; padding: 2px 8px; border-radius: 12px;
            font-size: 12px; font-weight: bold;
        }
        .badge-male   { background: #cce5ff; color: #004085; }
        .badge-female { background: #f8d7da; color: #721c24; }
        dl { display: grid; grid-template-columns: 200px 1fr; gap: 8px 16px; font-size: 14px; }
        dt { font-weight: bold; color: #555; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
        .stat-card {
            background: white; border-radius: 8px; padding: 20px;
            text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }
        .stat-number { font-size: 32px; font-weight: bold; color: #2c5f8a; }
        .stat-label  { font-size: 13px; color: #888; margin-top: 4px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    </style>
</head>
<body>
<nav>
    <span class="nav-brand">Fertility Clinic</span>
    <div>
        <a href="{% url 'dashboard' %}">Dashboard</a>
        <a href="{% url 'patient-list' %}">Patients</a>
        <a href="{% url 'appointment-list' %}">Appointments</a>
        <a href="{% url 'specimen-list' %}">Specimens</a>
        <a href="/admin/">Admin</a>
    </div>
</nav>
<div class="container">
    {% block content %}{% endblock %}
</div>
</body>
</html>
