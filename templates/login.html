<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Fertility Clinic</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fa;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-card {
            background: white;
            border-radius: 10px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        .logo {
            text-align: center;
            color: #2c5f8a;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 32px;
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            color: #555;
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            margin-bottom: 18px;
        }
        input:focus { outline: none; border-color: #2c5f8a; }
        .btn {
            width: 100%;
            padding: 12px;
            background: #2c5f8a;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 15px;
            cursor: pointer;
        }
        .btn:hover { background: #1e4466; }
        .error {
            background: #fde8e8;
            color: #c0392b;
            padding: 10px 14px;
            border-radius: 5px;
            font-size: 13px;
            margin-bottom: 18px;
        }
        .staff-link {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #888;
        }
        .staff-link a { color: #2c5f8a; text-decoration: none; }
        .staff-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="logo">Fertility Clinic</div>
    <div class="subtitle">Patient & Staff Portal</div>

    {% if form.errors %}
    <div class="error">Invalid username or password. Please try again.</div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autofocus required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>

        <button type="submit" class="btn">Sign In</button>
    </form>

    <div class="staff-link">
        Clinician? <a href="/admin/">Go to Admin Panel</a>
    </div>
</div>
</body>
</html>
